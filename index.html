<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tamil PDF Question Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222f;
    --border: #2e2e40;
    --accent: #7c5cfc;
    --accent2: #a78bfa;
    --gold: #f59e0b;
    --text: #e8e8f0;
    --muted: #8888a8;
    --danger: #ef4444;
    --success: #22c55e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }

  /* Header */
  header {
    width: 100%;
    max-width: 860px;
    text-align: center;
    margin-bottom: 36px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, #2a1f5e, #1e1b4b);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    color: var(--accent2);
    letter-spacing: .5px;
    margin-bottom: 16px;
  }

  h1 {
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 700;
    line-height: 1.2;
    background: linear-gradient(135deg, #c4b5fd, #7c5cfc, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tamil-title {
    font-family: 'Noto Sans Tamil', sans-serif;
    font-size: clamp(14px, 3vw, 20px);
    color: var(--muted);
    margin-top: 6px;
  }

  /* Main card */
  .card {
    width: 100%;
    max-width: 860px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 24px;
  }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all .25s;
    background: var(--surface2);
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: #1e1b4b33;
  }

  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-icon {
    font-size: 48px;
    margin-bottom: 12px;
  }

  .upload-text {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  .upload-sub {
    font-size: 13px;
    color: var(--muted);
    font-family: 'Noto Sans Tamil', sans-serif;
  }

  /* File info */
  .file-info {
    display: none;
    align-items: center;
    gap: 12px;
    background: #1e1b4b44;
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 14px 18px;
    margin-top: 16px;
  }

  .file-info.show { display: flex; }

  .file-icon { font-size: 28px; }

  .file-name {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    word-break: break-all;
  }

  .file-size { font-size: 12px; color: var(--muted); }

  .remove-btn {
    background: none;
    border: none;
    color: var(--danger);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
  }

  /* Settings row */
  .settings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 24px;
  }

  @media (max-width: 580px) { .settings { grid-template-columns: 1fr; } }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: .5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .field select, .field input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border .2s;
    appearance: none;
  }

  .field select:focus, .field input:focus { border-color: var(--accent); }

  /* Generate button */
  .gen-btn {
    width: 100%;
    margin-top: 24px;
    background: linear-gradient(135deg, #7c5cfc, #5b3fd4);
    border: none;
    border-radius: 12px;
    padding: 16px;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .gen-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px #7c5cfc44; }
  .gen-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  /* Spinner */
  .spinner {
    width: 20px; height: 20px;
    border: 3px solid #ffffff44;
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Progress */
  .progress-wrap {
    display: none;
    margin-top: 20px;
    background: var(--surface2);
    border-radius: 8px;
    overflow: hidden;
    height: 6px;
  }
  .progress-wrap.show { display: block; }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 8px;
    transition: width .4s ease;
    width: 0%;
  }

  .status-msg {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-top: 10px;
    font-family: 'Noto Sans Tamil', sans-serif;
    min-height: 20px;
  }

  /* Results */
  .results-card {
    display: none;
    width: 100%;
    max-width: 860px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
  }
  .results-card.show { display: block; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .results-title {
    font-size: 20px;
    font-weight: 700;
  }

  .results-meta {
    font-size: 13px;
    color: var(--muted);
    font-family: 'Noto Sans Tamil', sans-serif;
  }

  .action-btns {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent2); }

  /* Question cards */
  .questions-list { display: flex; flex-direction: column; gap: 16px; }

  .q-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 22px;
    transition: border .2s;
    position: relative;
  }

  .q-card:hover { border-color: #4a4a6a; }

  .q-number {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .q-type-badge {
    background: #2a1f5e;
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 10px;
    color: var(--accent2);
  }

  .q-text {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.65;
    font-family: 'Noto Sans Tamil', sans-serif;
    color: var(--text);
  }

  .q-answer {
    margin-top: 12px;
    padding: 12px 14px;
    background: #1a2a1a;
    border-left: 3px solid var(--success);
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    color: #86efac;
    font-family: 'Noto Sans Tamil', sans-serif;
    display: none;
  }

  .q-answer.show { display: block; }

  .q-toggle {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0;
  }
  .q-toggle:hover { color: var(--accent2); }

  /* MCQ options */
  .options-list {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .option {
    font-size: 14px;
    font-family: 'Noto Sans Tamil', sans-serif;
    color: var(--muted);
    padding: 8px 12px;
    border-radius: 8px;
    background: #1a1a24;
    border: 1px solid var(--border);
  }

  .option.correct {
    color: var(--success);
    border-color: var(--success);
    background: #1a2a1a;
  }

  /* Error */
  .error-box {
    display: none;
    background: #2a1414;
    border: 1px solid var(--danger);
    border-radius: 10px;
    padding: 14px 18px;
    color: #fca5a5;
    font-size: 14px;
    margin-top: 16px;
    font-family: 'Noto Sans Tamil', sans-serif;
  }
  .error-box.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="badge">✦ AI Powered · Tamil Language</div>
  <h1>Tamil PDF Question Generator</h1>
  <p class="tamil-title">தமிழ் PDF கேள்வி உருவாக்கி</p>
</header>

<!-- Upload Card -->
<div class="card">
  <div class="upload-zone" id="dropZone">
    <input type="file" id="pdfInput" accept=".pdf" />
    <div class="upload-icon">📄</div>
    <div class="upload-text">Upload Tamil PDF</div>
    <p class="upload-sub">தமிழ் PDF கோப்பை இங்கே இழுத்து விடுங்கள் அல்லது கிளிக் செய்யுங்கள்</p>
  </div>

  <div class="file-info" id="fileInfo">
    <span class="file-icon">📑</span>
    <div>
      <div class="file-name" id="fileName">—</div>
      <div class="file-size" id="fileSize">—</div>
    </div>
    <button class="remove-btn" id="removeBtn" title="Remove">✕</button>
  </div>

  <div class="settings">
    <div class="field">
      <label>Question Type · கேள்வி வகை</label>
      <select id="qType">
        <option value="mixed">Mixed · கலந்த வகை</option>
        <option value="mcq">MCQ · பல விருப்ப கேள்விகள்</option>
        <option value="short">Short Answer · குறு விடை</option>
        <option value="descriptive">Descriptive · விவரணை</option>
        <option value="truefalse">True / False · சரி / தவறு</option>
      </select>
    </div>
    <div class="field">
      <label>Number of Questions · கேள்விகள் எண்ணிக்கை</label>
      <input type="number" id="qCount" value="10" min="3" max="30" />
    </div>
    <div class="field">
      <label>Difficulty · கடினத்தன்மை</label>
      <select id="difficulty">
        <option value="easy">Easy · எளிது</option>
        <option value="medium" selected>Medium · நடுத்தரம்</option>
        <option value="hard">Hard · கடினம்</option>
      </select>
    </div>
    <div class="field">
      <label>Answer Language · விடை மொழி</label>
      <select id="ansLang">
        <option value="tamil">Tamil · தமிழ்</option>
        <option value="both">Tamil + English</option>
        <option value="english">English Only</option>
      </select>
    </div>
  </div>

  <button class="gen-btn" id="genBtn" disabled>
    <span id="btnText">📤 Upload a PDF to Start</span>
  </button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="status-msg" id="statusMsg"></div>

  <div class="error-box" id="errorBox"></div>
</div>

<!-- Results -->
<div class="results-card" id="resultsCard">
  <div class="results-header">
    <div>
      <div class="results-title">📝 Generated Questions</div>
      <div class="results-meta" id="resultsMeta"></div>
    </div>
    <div class="action-btns">
      <button class="btn-outline" id="copyBtn">📋 Copy All</button>
      <button class="btn-outline" id="downloadBtn">⬇️ Download .txt</button>
      <button class="btn-outline" id="regenerateBtn">🔄 Regenerate</button>
    </div>
  </div>
  <div class="questions-list" id="questionsList"></div>
</div>

<script>
// ── State ──
let pdfFile = null;
let questionsData = [];

// ── Elements ──
const dropZone = document.getElementById('dropZone');
const pdfInput = document.getElementById('pdfInput');
const fileInfo = document.getElementById('fileInfo');
const fileName = document.getElementById('fileName');
const fileSize = document.getElementById('fileSize');
const removeBtn = document.getElementById('removeBtn');
const genBtn = document.getElementById('genBtn');
const btnText = document.getElementById('btnText');
const progressWrap = document.getElementById('progressWrap');
const progressBar = document.getElementById('progressBar');
const statusMsg = document.getElementById('statusMsg');
const errorBox = document.getElementById('errorBox');
const resultsCard = document.getElementById('resultsCard');
const resultsMeta = document.getElementById('resultsMeta');
const questionsList = document.getElementById('questionsList');
const copyBtn = document.getElementById('copyBtn');
const downloadBtn = document.getElementById('downloadBtn');
const regenerateBtn = document.getElementById('regenerateBtn');

// ── File handling ──
pdfInput.addEventListener('change', e => handleFile(e.target.files[0]));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') handleFile(f);
  else showError('Please upload a valid PDF file. · சரியான PDF கோப்பை பதிவேற்றவும்.');
});

removeBtn.addEventListener('click', clearFile);

function handleFile(f) {
  if (!f) return;
  if (f.type !== 'application/pdf') { showError('Only PDF files are supported.'); return; }
  if (f.size > 20 * 1024 * 1024) { showError('File too large. Max 20MB allowed.'); return; }
  pdfFile = f;
  fileName.textContent = f.name;
  fileSize.textContent = formatSize(f.size);
  fileInfo.classList.add('show');
  genBtn.disabled = false;
  btnText.textContent = '✨ Generate Questions · கேள்விகள் உருவாக்கு';
  hideError();
}

function clearFile() {
  pdfFile = null;
  pdfInput.value = '';
  fileInfo.classList.remove('show');
  genBtn.disabled = true;
  btnText.textContent = '📤 Upload a PDF to Start';
  resultsCard.classList.remove('show');
  hideError();
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

// ── Generate ──
genBtn.addEventListener('click', generateQuestions);
regenerateBtn.addEventListener('click', generateQuestions);

async function generateQuestions() {
  if (!pdfFile) return;

  const qType = document.getElementById('qType').value;
  const qCount = parseInt(document.getElementById('qCount').value) || 10;
  const difficulty = document.getElementById('difficulty').value;
  const ansLang = document.getElementById('ansLang').value;

  // UI: loading state
  genBtn.disabled = true;
  btnText.innerHTML = '<div class="spinner"></div> Generating...';
  progressWrap.classList.add('show');
  setProgress(10, 'PDF படிக்கிறோம்... Reading PDF...');
  hideError();
  resultsCard.classList.remove('show');

  try {
    // Convert PDF to base64
    const base64 = await fileToBase64(pdfFile);
    setProgress(30, 'Claude AIக்கு அனுப்புகிறோம்... Sending to Claude AI...');

    const langInstruction = ansLang === 'tamil'
      ? 'Provide answers ONLY in Tamil language.'
      : ansLang === 'english'
      ? 'Provide answers ONLY in English.'
      : 'Provide answers in both Tamil and English.';

    const typeInstruction = {
      mixed: 'Generate a mix of MCQ, Short Answer, Descriptive, and True/False questions.',
      mcq: 'Generate ONLY Multiple Choice Questions (MCQ) with 4 options (A, B, C, D) and mark the correct answer.',
      short: 'Generate ONLY Short Answer questions (1-3 sentences answer expected).',
      descriptive: 'Generate ONLY Descriptive/Essay type questions.',
      truefalse: 'Generate ONLY True/False questions with the correct answer.'
    }[qType];

    const diffMap = { easy: 'easy', medium: 'medium difficulty', hard: 'challenging and hard' };

    const systemPrompt = `You are an expert Tamil language educator and question paper setter. 
You will receive a Tamil language PDF document and must generate high-quality exam questions from it.
Always respond in valid JSON format only. No markdown, no explanation outside JSON.`;

    const userPrompt = `Read this Tamil PDF document carefully and generate exactly ${qCount} questions.

Requirements:
- ${typeInstruction}
- Difficulty level: ${diffMap[difficulty]}
- Questions MUST be written in Tamil language (தமிழில் கேள்விகள் எழுதவும்)
- ${langInstruction}
- Questions must be based on the actual content of the PDF

Return ONLY a valid JSON array with this structure:
[
  {
    "number": 1,
    "type": "MCQ" | "Short Answer" | "Descriptive" | "True/False",
    "question": "Tamil question text here",
    "options": ["A. option1", "B. option2", "C. option3", "D. option4"],  // only for MCQ, else empty array
    "correct_option": "A",  // only for MCQ and True/False, else ""
    "answer": "Answer text here"
  }
]

Generate exactly ${qCount} questions now from the provided Tamil PDF.`;

    setProgress(50, 'AI கேள்விகளை உருவாக்குகிறது... AI is creating questions...');

    // Calculate tokens needed: ~150 tokens per question avg
    const tokensNeeded = Math.max(4000, qCount * 200);

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: tokensNeeded,
        system: systemPrompt,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'document',
              source: { type: 'base64', media_type: 'application/pdf', data: base64 }
            },
            { type: 'text', text: userPrompt }
          ]
        }]
      })
    });

    setProgress(80, 'பதில் பெறுகிறோம்... Receiving response...');

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const data = await response.json();
    const rawText = data.content.map(b => b.text || '').join('').trim();

    setProgress(95, 'கேள்விகளை தயாரிக்கிறோம்... Preparing questions...');

    // Robust JSON parsing
    let parsed;
    try {
      // Strip markdown fences
      let clean = rawText.replace(/```json|```/g, '').trim();

      // Try direct parse first
      try {
        parsed = JSON.parse(clean);
      } catch {
        // Extract JSON array even if truncated
        const startIdx = clean.indexOf('[');
        if (startIdx === -1) throw new Error('No JSON array found in response.');
        let jsonStr = clean.slice(startIdx);

        // If JSON is truncated, close it properly
        try {
          parsed = JSON.parse(jsonStr);
        } catch {
          // Fix truncated JSON: remove incomplete last object and close array
          const lastCompleteObj = jsonStr.lastIndexOf('},');
          if (lastCompleteObj !== -1) {
            jsonStr = jsonStr.slice(0, lastCompleteObj + 1) + ']';
          } else {
            const lastBrace = jsonStr.lastIndexOf('}');
            if (lastBrace !== -1) {
              jsonStr = jsonStr.slice(0, lastBrace + 1) + ']';
            } else {
              throw new Error('Response was cut off too early. Try fewer questions.');
            }
          }
          parsed = JSON.parse(jsonStr);
        }
      }
    } catch (parseErr) {
      throw new Error('Could not parse AI response. Try reducing question count. · கேள்விகள் எண்ணிக்கையை குறைக்கவும்.');
    }

    questionsData = parsed;
    setProgress(100, 'முடிந்தது! Done!');

    setTimeout(() => {
      renderQuestions(qType, qCount, difficulty);
      genBtn.disabled = false;
      btnText.textContent = '✨ Regenerate Questions · மீண்டும் உருவாக்கு';
      progressWrap.classList.remove('show');
      statusMsg.textContent = '';
    }, 600);

  } catch (err) {
    genBtn.disabled = false;
    btnText.textContent = '✨ Generate Questions · கேள்விகள் உருவாக்கு';
    progressWrap.classList.remove('show');
    statusMsg.textContent = '';
    showError('Error: ' + (err.message || 'Something went wrong. Please try again.'));
  }
}

// ── Render ──
function renderQuestions(qType, qCount, difficulty) {
  questionsList.innerHTML = '';
  const diffLabel = { easy: '🟢 Easy', medium: '🟡 Medium', hard: '🔴 Hard' }[difficulty];

  resultsMeta.textContent = `${questionsData.length} questions · ${diffLabel} · ${pdfFile.name}`;

  questionsData.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'q-card';

    const isMCQ = q.type === 'MCQ' || (Array.isArray(q.options) && q.options.length > 0);
    const isTF = q.type === 'True/False';

    let optionsHTML = '';
    if (isMCQ && q.options && q.options.length) {
      optionsHTML = `<div class="options-list">` +
        q.options.map(opt => {
          const letter = opt.charAt(0).toUpperCase();
          const isCorrect = letter === (q.correct_option || '').toUpperCase();
          return `<div class="option${isCorrect ? ' correct' : ''}">${opt}${isCorrect ? ' ✓' : ''}</div>`;
        }).join('') +
        `</div>`;
    }

    const hasAnswer = q.answer && q.answer.trim();
    const answerHTML = hasAnswer ? `
      <button class="q-toggle" onclick="toggleAnswer(this)">👁 Show Answer · விடை காண்க</button>
      <div class="q-answer">${q.answer}</div>
    ` : '';

    card.innerHTML = `
      <div class="q-number">
        Q${q.number || (idx + 1)}
        <span class="q-type-badge">${q.type || qType}</span>
      </div>
      <div class="q-text">${q.question}</div>
      ${optionsHTML}
      ${answerHTML}
    `;

    questionsList.appendChild(card);
  });

  resultsCard.classList.add('show');
  resultsCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleAnswer(btn) {
  const ans = btn.nextElementSibling;
  const isShowing = ans.classList.toggle('show');
  btn.textContent = isShowing ? '🙈 Hide Answer · மறை' : '👁 Show Answer · விடை காண்க';
}

// ── Copy / Download ──
copyBtn.addEventListener('click', () => {
  const text = questionsData.map((q, i) => {
    let s = `${q.number || i+1}. [${q.type}] ${q.question}`;
    if (q.options?.length) s += '\n' + q.options.join('\n');
    if (q.correct_option) s += `\nCorrect: ${q.correct_option}`;
    if (q.answer) s += `\nAnswer: ${q.answer}`;
    return s;
  }).join('\n\n');

  navigator.clipboard.writeText(text).then(() => {
    copyBtn.textContent = '✅ Copied!';
    setTimeout(() => copyBtn.textContent = '📋 Copy All', 2000);
  });
});

downloadBtn.addEventListener('click', () => {
  const text = questionsData.map((q, i) => {
    let s = `${q.number || i+1}. [${q.type}]\n${q.question}`;
    if (q.options?.length) s += '\n' + q.options.join('\n');
    if (q.correct_option) s += `\nCorrect Answer: ${q.correct_option}`;
    if (q.answer) s += `\nAnswer: ${q.answer}`;
    return s;
  }).join('\n\n─────────────────────────────\n\n');

  const blob = new Blob([`Tamil PDF Question Generator\nFile: ${pdfFile?.name || ''}\n\n${'═'.repeat(40)}\n\n${text}`], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'questions_' + (pdfFile?.name?.replace('.pdf','') || 'output') + '.txt';
  a.click();
});

// ── Helpers ──
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Failed to read file'));
    r.readAsDataURL(file);
  });
}

function setProgress(pct, msg) {
  progressBar.style.width = pct + '%';
  statusMsg.textContent = msg;
}

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.classList.add('show');
}

function hideError() {
  errorBox.classList.remove('show');
}
</script>
